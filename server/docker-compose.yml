services:
  postgres:
    image: postgres:16-alpine
    container_name: zoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoe
      POSTGRES_PASSWORD: zoe
      POSTGRES_DB: zoe
    ports:
      - "5432:5432"
    volumes:
      - zoe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoe -d zoe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zoe_pgdata:
